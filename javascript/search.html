<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Throttle: Scroll</title>
    <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 2rem;
      height: 3000px; /* Simulate scrollable content */
    }
    .tracker {
      position: fixed;
      top: 10px;
      left: 10px;
      background: black;
      color: lime;
      padding: 10px 20px;
      font-size: 1rem;
      border-radius: 6px;
    }
  </style>
    <script defer src="./Debounce.js"></script>
</head>
<body>
     <div class="tracker" id="tracker">Scroll Y: 0</div>

</body>
</html>
